<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Klarblick</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
.kb-root {
  --bg: #F5F6F8;
  --surface: #FFFFFF;
  --ink: #1C2230;
  --ink-muted: #5B6472;
  --border: #E1E4E8;
  --accent: #2E5C8A;
  --income: #3F7A5C;
  --expense: #7C2D3A;
  --radius: 14px;
  font-family: 'IBM Plex Sans', sans-serif;
  color: var(--ink);
  background: var(--bg);
  min-height: 100%;
  padding: 28px;
  box-sizing: border-box;
  max-width: 1080px;
  margin: 0 auto;
}
.kb-root * { box-sizing: border-box; }
.kb-root :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

html, body { background: #F5F6F8; margin: 0; }

.kb-loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; min-height: 320px; color: var(--ink-muted);
}
.kb-spin { animation: kb-spin 1s linear infinite; }
@keyframes kb-spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) {
  .kb-spin { animation: none; }
  .kb-root * { transition: none !important; }
}

.kb-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
.kb-brand { display: flex; flex-direction: column; }
.kb-brand-mark { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -0.01em; }
.kb-brand-sub { font-size: 12.5px; color: var(--ink-muted); margin-top: 2px; }

.kb-month-nav { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 6px 10px; }
.kb-month-label { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14.5px; min-width: 130px; text-align: center; }

.kb-icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%; border: none; background: transparent;
  color: var(--ink-muted); cursor: pointer; transition: background 0.15s ease, color 0.15s ease;
}
.kb-icon-btn:hover { background: var(--bg); color: var(--ink); }

.kb-btn {
  display: inline-flex; align-items: center; gap: 6px; font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13.5px; font-weight: 500; border-radius: 10px; padding: 9px 14px;
  border: 1px solid transparent; cursor: pointer; transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  white-space: nowrap;
}
.kb-btn:active { transform: scale(0.97); }
.kb-btn-primary { background: var(--accent); color: #fff; }
.kb-btn-primary:hover { background: #274d75; }
.kb-btn-ghost { background: var(--surface); color: var(--ink); border-color: var(--border); }
.kb-btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

.kb-summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
.kb-summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; display: flex; flex-direction: column; gap: 6px; }
.kb-summary-label { font-size: 12.5px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.kb-summary-value { font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 500; font-variant-numeric: tabular-nums; }
.kb-summary-value.income { color: var(--income); }
.kb-summary-value.expense { color: var(--expense); }
.kb-delta { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; font-family: 'IBM Plex Mono', monospace; width: fit-content; color: var(--ink-muted); }
.kb-delta.up { color: var(--income); }
.kb-delta.down { color: var(--ink-muted); }
.kb-delta.bad { color: var(--expense); }
.kb-delta.good { color: var(--income); }

.kb-banner-error { background: #FBEAEC; color: var(--expense); border: 1px solid #F1C9CF; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
.kb-banner-info { background: #EAF2ED; color: var(--income); border: 1px solid #CFE3D6; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }

.kb-main-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 16px; align-items: start; }
.kb-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; min-width: 0; }
.kb-panel-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; margin: 0 0 14px; }

.kb-chart-wrap { display: flex; flex-direction: column; }
.kb-donut { position: relative; }
.kb-donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
.kb-donut-total { font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 500; }
.kb-donut-caption { font-size: 11px; color: var(--ink-muted); }

.kb-legend { list-style: none; margin: 10px 0 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.kb-legend-row { display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
.kb-legend-top { display: flex; align-items: center; gap: 8px; }
.kb-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.kb-legend-icon { color: var(--ink-muted); flex-shrink: 0; }
.kb-legend-name { flex: 1; }
.kb-legend-pct { color: var(--ink-muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; width: 36px; text-align: right; }
.kb-legend-value { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; width: 90px; text-align: right; }

.kb-panel-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
.kb-panel-title-row .kb-panel-title { margin: 0; }
.kb-budget-toggle-btn {
  display: inline-flex; align-items: center; gap: 5px; background: transparent; border: none;
  color: var(--accent); font-family: 'IBM Plex Sans', sans-serif; font-size: 12.5px; font-weight: 500;
  cursor: pointer; padding: 4px 6px; border-radius: 8px; white-space: nowrap;
}
.kb-budget-toggle-btn:hover { background: var(--bg); }

.kb-budget-bar-track { height: 5px; border-radius: 3px; background: var(--bg); overflow: hidden; }
.kb-budget-bar-fill { height: 100%; border-radius: 3px; transition: width 0.2s ease; }
.kb-budget-note { font-size: 11px; color: var(--ink-muted); font-family: 'IBM Plex Mono', monospace; }
.kb-budget-note.over { color: var(--expense); font-weight: 500; }

.kb-budget-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.kb-budget-row:last-child { border-bottom: none; }
.kb-budget-row-name { flex: 1; font-size: 13.5px; display: flex; align-items: center; gap: 8px; min-width: 0; }
.kb-budget-row-name span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kb-budget-input { width: 100px; flex-shrink: 0; margin-top: 0; }
.kb-budget-hint { font-size: 12px; color: var(--ink-muted); margin: 0 0 12px; }

.kb-chart-legend { display: flex; gap: 16px; margin-bottom: 8px; }
.kb-chart-legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-muted); }

.kb-empty { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; color: var(--ink-muted); font-size: 13.5px; padding: 20px 0; }

.kb-ledger { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; max-height: 420px; overflow-y: auto; }
.kb-ledger-row { display: flex; align-items: center; gap: 10px; padding: 9px 6px; border-radius: 8px; transition: background 0.12s ease; }
.kb-ledger-row:hover { background: var(--bg); }
.kb-ledger-icon { width: 30px; height: 30px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.kb-ledger-main { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.kb-ledger-category { font-size: 13.5px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kb-ledger-note { font-size: 12px; color: var(--ink-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kb-ledger-date { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-muted); flex-shrink: 0; width: 90px; }
.kb-ledger-amount { font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; font-variant-numeric: tabular-nums; flex-shrink: 0; width: 100px; text-align: right; }
.kb-ledger-amount.income { color: var(--income); }
.kb-ledger-amount.expense { color: var(--expense); }
.kb-ledger-delete { background: none; border: none; color: var(--ink-muted); cursor: pointer; opacity: 0; transition: opacity 0.12s ease, color 0.12s ease; flex-shrink: 0; padding: 4px; }
.kb-ledger-row:hover .kb-ledger-delete { opacity: 1; }
.kb-ledger-delete:hover { color: var(--expense); }

.kb-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.kb-security-note { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-muted); }
.kb-footer-actions { display: flex; align-items: center; gap: 10px; }
.kb-reset-link { background: none; border: none; color: var(--ink-muted); font-size: 11.5px; text-decoration: underline; cursor: pointer; padding: 0; }
.kb-reset-link:hover { color: var(--expense); }

.kb-modal-backdrop { position: fixed; inset: 0; background: rgba(28, 34, 48, 0.45); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
.kb-modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; padding: 22px; box-shadow: 0 20px 60px rgba(28,34,48,0.25); }
.kb-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.kb-modal-header h2 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; margin: 0; }

.kb-form { display: flex; flex-direction: column; gap: 6px; }
.kb-label { font-size: 12.5px; font-weight: 500; color: var(--ink-muted); margin-top: 10px; }
.kb-input { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; padding: 10px 12px; border-radius: 9px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); margin-top: 4px; width: 100%; }
.kb-amount-input { font-family: 'IBM Plex Mono', monospace; font-size: 20px; }

.kb-type-toggle { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 4px; }
.kb-type-btn { flex: 1; padding: 9px 0; border: none; background: var(--surface); color: var(--ink-muted); font-size: 13.5px; font-weight: 500; cursor: pointer; }
.kb-type-btn.active.expense { background: var(--expense); color: #fff; }
.kb-type-btn.active.income { background: var(--income); color: #fff; }

.kb-chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.kb-chip { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--ink-muted); border-radius: 999px; padding: 7px 12px; font-size: 12.5px; cursor: pointer; transition: border-color 0.12s ease; }
.kb-chip.active { font-weight: 500; }

.kb-form-error { color: var(--expense); font-size: 12.5px; margin: 6px 0 0; }
.kb-form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }

.kb-tabs { display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 3px; }
.kb-tab { padding: 8px 15px; border: none; background: transparent; border-radius: 8px; font-family: 'IBM Plex Sans', sans-serif; font-size: 13.5px; font-weight: 500; color: var(--ink-muted); cursor: pointer; transition: background 0.15s ease, color 0.15s ease; }
.kb-tab.active { background: var(--accent); color: #fff; }
.kb-tab:not(.active):hover { color: var(--ink); }

.kb-subheader { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.kb-subheader-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; }

.kb-analysis-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
.kb-range-toggle { display: flex; gap: 3px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
.kb-range-btn { padding: 6px 13px; border: none; background: transparent; border-radius: 7px; font-family: 'IBM Plex Sans', sans-serif; font-size: 12.5px; font-weight: 500; color: var(--ink-muted); cursor: pointer; }
.kb-range-btn.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 3px rgba(28,34,48,0.12); }

.kb-insight-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
.kb-insight-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.kb-insight-label { font-size: 11px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.045em; }
.kb-insight-value { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 500; font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kb-insight-sub { font-size: 11.5px; color: var(--ink-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.kb-analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; margin-top: 16px; }
.kb-axis-tick { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: var(--ink-muted); }
.kb-chart-caption { font-size: 12px; color: var(--ink-muted); margin: 10px 0 0; }

@media (max-width: 760px) {
  .kb-root { padding: 16px; }
  .kb-header { flex-direction: column; align-items: stretch; }
  .kb-summary-row { grid-template-columns: 1fr; }
  .kb-main-grid { grid-template-columns: 1fr; }
  .kb-ledger-note { display: none; }
  .kb-footer { flex-direction: column; align-items: stretch; }
  .kb-insight-row { grid-template-columns: repeat(2, 1fr); }
  .kb-analysis-grid { grid-template-columns: 1fr; }
  .kb-analysis-header { flex-direction: column; align-items: stretch; }
  .kb-ledger-delete { opacity: 1; padding: 8px; }
}

</style>
</head>
<body>
<div id="root">
  <div class="kb-root kb-loading-screen">
    <p>Klarblick wird geladen …</p>
    <p style="font-size:12px;max-width:360px;text-align:center;">
      Falls hier dauerhaft nichts erscheint, prüfe deine Internetverbindung
      (beim allerersten Start werden React und die Schriftart einmalig geladen).
    </p>
  </div>
</div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


<script type="text/babel">
/* ===== Klarblick – Standalone-Version (ohne Build-Tools, ohne Internet nach dem ersten Laden der Schrift) ===== */
(function () {
  'use strict';
  var h = React.createElement;

  /* ---------- Konstanten ---------- */
  var STORAGE_KEY = 'klarblick-data';

  var EXPENSE_CATEGORIES = [
    { name: 'Essen', icon: 'utensils', color: '#C17817' },
    { name: 'Miete & Wohnen', icon: 'home', color: '#35618F' },
    { name: 'Transport', icon: 'car', color: '#1F7A6C' },
    { name: 'Freizeit & Hobby', icon: 'film', color: '#7B4FA3' },
    { name: 'Gesundheit', icon: 'heart', color: '#C0447A' },
    { name: 'Bildung', icon: 'graduationCap', color: '#6B7F3F' },
    { name: 'Shopping', icon: 'shoppingBag', color: '#5C6B73' },
    { name: 'Sonstiges', icon: 'moreHorizontal', color: '#8A8578' },
  ];

  var INCOME_CATEGORIES = [
    { name: 'Gehalt / Werkstudent', icon: 'briefcase', color: '#3F7A5C' },
    { name: 'BAföG & Förderung', icon: 'landmark', color: '#2E5C8A' },
    { name: 'Sonstige Einnahme', icon: 'wallet', color: '#4C8A6E' },
  ];

  var EXTRA_PALETTE = ['#A63D5A', '#3D6B8A', '#8A6B3D', '#5A8A3D', '#6B3D8A', '#3D8A7A', '#8A3D3D', '#3D5A8A', '#8A5A3D', '#5A3D8A'];

  var SHORT_MONTHS = ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'];
  var LONG_MONTHS = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];

  /* ---------- Reine Helfer-Funktionen ---------- */
  function pad2(n) { return String(n).padStart(2, '0'); }

  function todayLocalISO() {
    var d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }

  function currentMonthStr() {
    var d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1);
  }

  function shiftMonth(monthStr, delta) {
    var parts = monthStr.split('-').map(Number);
    var d = new Date(parts[0], parts[1] - 1 + delta, 1);
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1);
  }

  function formatMonthLabel(monthStr) {
    var parts = monthStr.split('-').map(Number);
    return LONG_MONTHS[parts[1] - 1] + ' ' + parts[0];
  }

  function formatMonthLabelShort(monthStr) {
    var parts = monthStr.split('-').map(Number);
    return SHORT_MONTHS[parts[1] - 1] + ' ' + String(parts[0]).slice(2);
  }

  function formatCurrency(value) {
    var n = Number(value) || 0;
    var neg = n < 0;
    var fixed = Math.abs(n).toFixed(2).replace('.', ',');
    var p = fixed.split(',');
    p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    return (neg ? '-' : '') + p.join(',') + ' €';
  }

  function formatCurrencyCompact(value) {
    return Math.abs(value) >= 1000 ? (value / 1000).toLocaleString('de-DE', { maximumFractionDigits: 1 }) + 'k €' : formatCurrency(value);
  }

  function formatDateShort(dateStr) {
    var parts = dateStr.split('-').map(Number);
    return pad2(parts[2]) + '.' + pad2(parts[1]) + '.' + parts[0];
  }

  function parseFlexibleDate(raw) {
    var trimmed = (raw || '').trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return trimmed;
    var deMatch = trimmed.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if (deMatch) return deMatch[3] + '-' + pad2(Number(deMatch[2])) + '-' + pad2(Number(deMatch[1]));
    var parsed = new Date(trimmed);
    if (!isNaN(parsed.getTime())) return parsed.getFullYear() + '-' + pad2(parsed.getMonth() + 1) + '-' + pad2(parsed.getDate());
    return null;
  }

  function parseGermanAmount(raw) {
    var s = (raw || '').trim();
    if (!s) return NaN;
    if (/^-?\d{1,3}(\.\d{3})*(,\d+)?$/.test(s)) s = s.replace(/\./g, '').replace(',', '.');
    else s = s.replace(',', '.');
    return parseFloat(s);
  }

  function generateId() {
    if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
    return Date.now() + '-' + Math.random().toString(36).slice(2, 9);
  }

  function getCategoryMeta(name, type, customCategories) {
    var presets = type === 'income' ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
    var preset = presets.find(function (c) { return c.name === name; });
    if (preset) return preset;
    var custom = customCategories.find(function (c) { return c.name === name && c.type === type; });
    if (custom) return custom;
    return { name: name, icon: 'tag', color: '#8A8578' };
  }

  /* ---------- CSV ---------- */
  function parseCSV(text, delimiter) {
    delimiter = delimiter || ';';
    var rows = [], row = [], field = '', inQuotes = false;
    function pushField() { row.push(field); field = ''; }
    function pushRow() { rows.push(row); row = []; }
    var s = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    for (var i = 0; i < s.length; i++) {
      var c = s[i];
      if (inQuotes) {
        if (c === '"') { if (s[i + 1] === '"') { field += '"'; i++; } else inQuotes = false; }
        else field += c;
      } else if (c === '"') inQuotes = true;
      else if (c === delimiter) pushField();
      else if (c === '\n') { pushField(); pushRow(); }
      else field += c;
    }
    if (field.length > 0 || row.length > 0) { pushField(); pushRow(); }
    var nonEmpty = rows.filter(function (r) { return !(r.length === 1 && r[0].trim() === ''); });
    if (nonEmpty.length === 0) return { header: [], data: [] };
    var header = nonEmpty[0].map(function (x) { return x.trim(); });
    var data = nonEmpty.slice(1).map(function (r) {
      var obj = {};
      header.forEach(function (hd, idx) { obj[hd] = r[idx] !== undefined ? r[idx] : ''; });
      return obj;
    });
    return { header: header, data: data };
  }

  function buildExportCSV(transactions) {

        h('div', { className: 'kb-insight-row' },
          h('div', { className: 'kb-insight-card' },
            h('span', { className: 'kb-insight-label' }, 'Ø Ausgaben / Monat'),
            h('span', { className: 'kb-insight-value' }, KB.formatCurrency(avgMonthlyExpense)),
            h('span', { className: 'kb-insight-sub' }, 'über ' + analysisRange + ' Monate')
          ),
          h('div', { className: 'kb-insight-card' },
            h('span', { className: 'kb-insight-label' }, 'Sparquote'),
            h('span', { className: 'kb-insight-value', style: savingsRate !== null ? { color: savingsRate >= 0 ? 'var(--income)' : 'var(--expense)' } : undefined }, savingsRate !== null ? savingsRate + '%' : '–'),
            h('span', { className: 'kb-insight-sub' }, savingsRate !== null ? 'der Einnahmen übrig' : 'keine Einnahmen erfasst')
          ),
          h('div', { className: 'kb-insight-card' },
            h('span', { className: 'kb-insight-label' }, 'Größte Einzelausgabe'),
            h('span', { className: 'kb-insight-value' }, biggestExpense ? KB.formatCurrency(biggestExpense.amount) : '–'),
            h('span', { className: 'kb-insight-sub' }, biggestExpense ? (biggestExpense.category + ' · ' + KB.formatDateShort(biggestExpense.date)) : 'keine Ausgaben erfasst')
          ),
          h('div', { className: 'kb-insight-card' },
            h('span', { className: 'kb-insight-label' }, 'Top-Kategorie'),
            h('span', { className: 'kb-insight-value' }, topCategoryOverall ? KB.formatCurrency(topCategoryOverall.value) : '–'),
            h('span', { className: 'kb-insight-sub' }, topCategoryOverall ? topCategoryOverall.name : 'keine Ausgaben erfasst')
          )
        ),
        h('div', { className: 'kb-panel' },
          h('h3', { className: 'kb-panel-title' }, 'Einnahmen vs. Ausgaben'),
          h(GroupedBarChart, { data: monthlySeries })
        ),
        h('div', { className: 'kb-analysis-grid' },
          h('div', { className: 'kb-panel' },
            h('h3', { className: 'kb-panel-title' }, 'Saldo-Verlauf'),
            h(LineChartSVG, { data: monthlySeries, dataKey: 'Saldo' }),
            h('p', { className: 'kb-chart-caption' }, 'Einnahmen minus Ausgaben, Monat für Monat.')
          ),
          h('div', { className: 'kb-panel' },
            h('h3', { className: 'kb-panel-title' }, 'Top-Kategorien im Zeitraum'),
            h(HBarChart, { data: rangeCategoryTotals })
          )
        )
      );
    }

    function renderRangeToggle() {
      return h('div', { className: 'kb-range-toggle' },
        [3, 6, 12].map(function (n) {
          return h('button', { type: 'button', key: n, className: 'kb-range-btn' + (analysisRange === n ? ' active' : ''), onClick: function () { setAnalysisRange(n); } }, n + ' Monate');
        })
      );
    }

    return h('div', { className: 'kb-root' },
      h('input', { type: 'file', accept: '.csv', ref: fileInputRef, onChange: handleFileChange, style: { display: 'none' } }),
      h('header', { className: 'kb-header' },
        h('div', { className: 'kb-brand' },
          h('span', { className: 'kb-brand-mark' }, 'Klarblick'),
          h('span', { className: 'kb-brand-sub' }, 'Deine Ausgaben, manuell erfasst')
        ),
        h('nav', { className: 'kb-tabs', role: 'tablist', 'aria-label': 'Ansicht wählen' },
          h('button', { type: 'button', role: 'tab', 'aria-selected': activeTab === 'uebersicht', className: 'kb-tab' + (activeTab === 'uebersicht' ? ' active' : ''), onClick: function () { setActiveTab('uebersicht'); } }, 'Übersicht'),
          h('button', { type: 'button', role: 'tab', 'aria-selected': activeTab === 'auswertungen', className: 'kb-tab' + (activeTab === 'auswertungen' ? ' active' : ''), onClick: function () { setActiveTab('auswertungen'); } }, 'Auswertungen')
        ),
        h('button', { className: 'kb-btn kb-btn-primary', onClick: function () { setIsFormOpen(true); } }, h(Icon, { name: 'plus', size: 16 }), ' Eintrag hinzufügen')
      ),
      savingError ? h('p', { className: 'kb-banner-error' }, 'Die letzte Änderung konnte nicht gespeichert werden. Bitte versuch es erneut.') : null,
      errorMsg ? h('p', { className: 'kb-banner-error' }, errorMsg) : null,
      infoMsg ? h('p', { className: 'kb-banner-info' }, infoMsg) : null,
      activeTab === 'uebersicht' ? renderUebersicht() : renderAuswertungen(),
      h('footer', { className: 'kb-footer' },
        h('span', { className: 'kb-security-note' }, h(Icon, { name: 'shield', size: 14 }), ' Keine Bankverbindung – alle Daten trägst du selbst ein und sie bleiben nur auf diesem PC.'),
        h('div', { className: 'kb-footer-actions' },
          h('button', { className: 'kb-btn kb-btn-ghost', onClick: handleImportClick, title: 'Erwartet CSV-Dateien (auch direkt von der Sparkasse). Du kannst jederzeit den kompletten Kontoauszug erneut exportieren und importieren – bereits vorhandene Buchungen werden automatisch erkannt und übersprungen.' }, h(Icon, { name: 'upload', size: 14 }), ' CSV importieren'),
          h('button', { className: 'kb-btn kb-btn-ghost', onClick: handleExport }, h(Icon, { name: 'download', size: 14 }), ' CSV exportieren'),
          h('button', { className: 'kb-reset-link', onClick: handleResetAll }, 'Alle Daten zurücksetzen')
        )
      ),
      isFormOpen ? h(TransactionForm, { customCategories: customCategories, onSubmit: addTransaction, onClose: function () { setIsFormOpen(false); } }) : null,
      isBudgetFormOpen ? h(BudgetForm, { budgets: budgets, customCategories: customCategories, onSave: saveBudgets, onClose: function () { setIsBudgetFormOpen(false); } }) : null
    );
  }

  window.KB = window.KB || {};
  window.KB.Klarblick = Klarblick;
})();

</script>
<script type="text/babel">
(function () {
  'use strict';
  function showFatalError(err) {
    var root = document.getElementById('root');
    root.innerHTML =
      '<div class="kb-root kb-loading-screen">' +
      '<p><strong>Klarblick konnte nicht gestartet werden.</strong></p>' +
      '<p style="font-size:12px;max-width:420px;text-align:center;">' +
      'Bitte stelle sicher, dass beim ersten Öffnen eine Internetverbindung besteht ' +
      '(React wird einmalig von einem CDN geladen) und lade die Seite neu (F5). ' +
      'Technische Meldung: ' + (err && err.message ? err.message : String(err)) +
      '</p></div>';
  }
  try {
    if (!window.React || !window.ReactDOM) {
      throw new Error('React konnte nicht geladen werden (keine Internetverbindung?).');
    }
    var container = document.getElementById('root');
    var root = ReactDOM.createRoot(container);
    root.render(React.createElement(window.KB.Klarblick));
  } catch (err) {
    console.error(err);
    showFatalError(err);
  }
})();
</script>
</body>
</html>
